# ================= LOAN =================

  /loans:
    get:
      tags: [Loan]
      summary: Get all loans
      responses:
        200:
          description: List loans

    post:
      tags: [Loan]
      summary: Borrow a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoan'
      responses:
        201:
          description: Loan created

  /loans/{id}:
    get:
      tags: [Loan]
      summary: Get loan by ID
      parameters:
        - in: path
          name: id
