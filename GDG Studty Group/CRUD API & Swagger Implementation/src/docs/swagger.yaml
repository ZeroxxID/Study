    delete:
      tags: [Loan]
      summary: Delete loan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Loan deleted

  /loans/{id}/return:
    patch:
      tags: [Loan]
      summary: Return borrowed book
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Book returned

# ================= PROFILE =================

  /profiles:
    get:
      tags: [Profile]
      summary: Get all profiles
      responses:
        200:
          description: List of profiles
    post:
      tags: [Profile]
      summary: Create profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfile'
      responses:
        201:
          description: Profile created

  /profiles/{id}:
    get:
      tags: [Profile]
      summary: Get profile by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Profile detail
    put:
      tags: [Profile]
      summary: Update profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfile'
      responses:
        200:
          description: Profile updated
    delete:
      tags: [Profile]
      summary: Delete profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Profile deleted


components:

  schemas:

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    CreateCategory:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Publisher:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    CreatePublisher:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Author:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    CreateAuthor:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        year:
          type: integer
        categoryId:
          type: integer
        publisherId:
          type: integer

    CreateBook:
      type: object
      required: [title, year, categoryId]
      properties:
        title:
          type: string
        year:
          type: integer
        categoryId:
          type: integer
        publisherId:
          type: integer

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string

    CreateMember:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string

    Loan:
      type: object
      properties:
        id:
          type: integer
        loanDate:
          type: string
          format: date-time
        returnDate:
          type: string
          nullable: true
        memberId:
          type: integer
        bookId:
          type: integer

    CreateLoan:
      type: object
      required: [memberId, bookId]
      properties:
        memberId:
          type: integer
        bookId:
          type: integer

    Profile:
      type: object
      properties:
        id:
          type: integer
        bio:
          type: string
        authorId:
          type: integer

    CreateProfile:
      type: object
      required: [bio, authorId]
      properties:
        bio:
          type: string
        authorId:
          type: integer
    
    UpdateProfile:
      type: object
      properties:
        bio:
          type: string
        authorId:
          type: integer
    